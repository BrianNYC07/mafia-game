# HTTP bring-up + ACME challenge. Room affinity: hash on ?room= so every
# player of a room reaches the same backend, where that room's authoritative
# state lives in memory. Redis carries cross-instance emits + room ownership.
upstream mafia_backend {
    hash $arg_room consistent;
    server back1:3001;
    server back2:3001;
    # Add one line per extra backend instance; consistent hashing remaps
    # only ~1/N of room codes when you scale.
}

server {
    listen 80;
    server_name _;

    # Let's Encrypt HTTP-01 challenge (used when you switch to TLS).
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # React production build.
    root /usr/share/nginx/html;
    index index.html;
    location / {
        try_files $uri /index.html;
    }

    # WebSocket/polling -> room-hashed backend instance.
    location /socket.io/ {
        proxy_pass http://mafia_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }

    # Health checks (round-robins across instances).
    location /healthz {
        proxy_pass http://mafia_backend;
    }
}
