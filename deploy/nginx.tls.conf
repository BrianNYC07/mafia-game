# TLS deploy. Same room-hash routing as nginx.http.conf, plus HTTPS.
# Replace every YOUR_DOMAIN below with your registered domain, then point
# NGINX_CONF at this file (see deploy/DEPLOY.md).
upstream mafia_backend {
    hash $arg_room consistent;
    server back1:3001;
    server back2:3001;
}

# HTTP -> HTTPS, but keep serving the ACME challenge for renewals.
server {
    listen 80;
    server_name YOUR_DOMAIN;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name YOUR_DOMAIN;

    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;

    # React production build.
    root /usr/share/nginx/html;
    index index.html;
    location / {
        try_files $uri /index.html;
    }

    # WebSocket/polling -> room-hashed backend instance.
    location /socket.io/ {
        proxy_pass http://mafia_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }

    location /healthz {
        proxy_pass http://mafia_backend;
    }
}
